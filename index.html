<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

header{
background:#1e293b;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
height:90vh;
}

.left{
width:40%;
background:#111827;
padding:20px;
overflow:auto;
border-right:1px solid #334155;
}

.right{
flex:1;
padding:20px;
overflow:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

button{
background:#3b82f6;
border:none;
padding:10px 15px;
border-radius:6px;
color:white;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#2563eb;
}

.card{
background:#1e293b;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.step{
margin-bottom:20px;
}

.title{
font-weight:bold;
margin-bottom:6px;
}

</style>

</head>

<body>

<header>
RAG Simulator
</header>

<div class="container">

<div class="left">

<h3>Documents</h3>

<textarea id="documents">
Azure DevOps helps teams manage software development using boards and pipelines.

Large Language Models generate answers but may hallucinate if knowledge is missing.

Retrieval Augmented Generation improves LLM answers by retrieving external documents.
</textarea>

<button onclick="ingestDocs()">1. Ingest Documents</button>

<h3>Ask Question</h3>

<input id="question" placeholder="Ask a question">

<button onclick="runRAG()">Run RAG</button>

</div>

<div class="right">

<div class="step">
<div class="title">Document Chunks</div>
<div id="chunks"></div>
</div>

<div class="step">
<div class="title">Embeddings</div>
<div id="embeddings"></div>
</div>

<div class="step">
<div class="title">Retrieved Context</div>
<div id="context"></div>
</div>

<div class="step">
<div class="title">LLM Answer</div>
<div id="answer"></div>
</div>

</div>

</div>

<script>

let chunks=[]
let vectors=[]

function ingestDocs(){

let text=document.getElementById("documents").value

chunks=text.split(".").map(x=>x.trim()).filter(x=>x.length>0)

let chunkDiv=document.getElementById("chunks")
chunkDiv.innerHTML=""

chunks.forEach((c,i)=>{

let card=document.createElement("div")
card.className="card"
card.innerText="Chunk "+(i+1)+": "+c

chunkDiv.appendChild(card)

})

createEmbeddings()

}

function createEmbeddings(){

vectors=[]

let embedDiv=document.getElementById("embeddings")
embedDiv.innerHTML=""

chunks.forEach((c,i)=>{

let vector=Math.random().toFixed(3)

vectors.push(vector)

let card=document.createElement("div")
card.className="card"
card.innerText="Chunk "+(i+1)+" Vector: "+vector

embedDiv.appendChild(card)

})

}

function runRAG(){

let question=document.getElementById("question").value.toLowerCase()

let bestIndex=0
let bestScore=0

chunks.forEach((c,i)=>{

let score=0

question.split(" ").forEach(word=>{

if(c.toLowerCase().includes(word)){
score++
}

})

if(score>bestScore){
bestScore=score
bestIndex=i
}

})

let context=chunks[bestIndex]

document.getElementById("context").innerHTML=
'<div class="card">'+context+'</div>'

generateAnswer(context)

}

function generateAnswer(context){

let answer="Based on retrieved context: "+context

document.getElementById("answer").innerHTML=
'<div class="card">'+answer+'</div>'

}

</script>

</body>

</html>
