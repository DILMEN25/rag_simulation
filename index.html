<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:flex;
height:92vh;
}

.left{
width:35%;
background:#111827;
padding:20px;
overflow:auto;
}

.right{
flex:1;
padding:20px;
overflow:auto;
}

textarea,input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:12px;
font-size:14px;
}

button{
background:#3b82f6;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
margin-bottom:12px;
}

button:hover{
background:#2563eb;
}

.card{
background:#1e293b;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.pipeline{
display:flex;
gap:10px;
margin-bottom:20px;
}

.stage{
flex:1;
background:#1e293b;
padding:10px;
border-radius:8px;
text-align:center;
font-size:13px;
}

.active{
background:#3b82f6;
}

</style>

</head>

<body>

<header>
RAG Visual Simulator
</header>

<div class="container">

<div class="left">

<h3>Knowledge Base</h3>

<textarea id="docs">
Azure DevOps helps manage software development projects.

RAG stands for Retrieval Augmented Generation.

LLMs can hallucinate if they lack external knowledge.

Vector databases store embeddings for similarity search.
</textarea>

<button onclick="ingest()">1. Ingest Documents</button>

<h3>Ask Question</h3>

<input id="question" placeholder="Example: What is RAG?">

<button onclick="runRAG()">Run RAG</button>

</div>

<div class="right">

<div class="pipeline">

<div id="stage1" class="stage">Documents</div>
<div id="stage2" class="stage">Chunking</div>
<div id="stage3" class="stage">Embeddings</div>
<div id="stage4" class="stage">Vector Search</div>
<div id="stage5" class="stage">Context</div>
<div id="stage6" class="stage">LLM Answer</div>

</div>

<div class="card">
<b>Chunks</b>
<div id="chunks"></div>
</div>

<div class="card">
<b>Embeddings</b>
<div id="embeddings"></div>
</div>

<div class="card">
<b>Retrieved Context</b>
<div id="context"></div>
</div>

<div class="card">
<b>Generated Answer</b>
<div id="answer"></div>
</div>

</div>

</div>

<script>

let chunks=[]
let embeddings=[]

function activate(stage){

document.querySelectorAll(".stage").forEach(x=>{
x.classList.remove("active")
})

document.getElementById(stage).classList.add("active")

}

function ingest(){

activate("stage1")

let text=document.getElementById("docs").value

chunks=text.split(".").map(x=>x.trim()).filter(x=>x.length>0)

document.getElementById("chunks").innerHTML=""

chunks.forEach((c,i)=>{

let div=document.createElement("div")
div.innerHTML="Chunk "+(i+1)+": "+c

document.getElementById("chunks").appendChild(div)

})

setTimeout(createEmbeddings,800)

}

function createEmbeddings(){

activate("stage3")

embeddings=[]

document.getElementById("embeddings").innerHTML=""

chunks.forEach((c,i)=>{

let vector=(Math.random()*1).toFixed(3)

embeddings.push(vector)

let div=document.createElement("div")
div.innerHTML="Chunk "+(i+1)+" → Vector "+vector

document.getElementById("embeddings").appendChild(div)

})

}

function runRAG(){

activate("stage4")

let q=document.getElementById("question").value.toLowerCase()

let best=0
let score=0

chunks.forEach((c,i)=>{

let s=0

q.split(" ").forEach(word=>{
if(c.toLowerCase().includes(word)) s++
})

if(s>score){
score=s
best=i
}

})

let context=chunks[best]

activate("stage5")

document.getElementById("context").innerHTML=context

setTimeout(()=>{
generate(context)
},700)

}

function generate(context){

activate("stage6")

let answer="Using retrieved context: "+context

document.getElementById("answer").innerHTML=answer

}

</script>

</body>

</html>
