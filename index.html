<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:340px 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:10px;
margin-bottom:15px;
}

textarea,input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-top:8px;
margin-bottom:10px;
}

button{
background:#3b82f6;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
}

button:hover{
background:#2563eb;
}

.sliderLabel{
font-size:13px;
color:#94a3b8;
}

.stage{
display:inline-block;
padding:6px 10px;
margin-right:6px;
border-radius:6px;
background:#334155;
font-size:12px;
}

.active{
background:#3b82f6;
}

.result{
margin-top:8px;
font-size:14px;
color:#cbd5f5;
}

.toggle{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
}

</style>
</head>

<body>

<header>Interactive RAG Simulator</header>

<div class="container">

<div>

<div class="card">

<b>Documents</b>

<textarea id="docs">
Azure DevOps helps teams manage software development.

RAG stands for Retrieval Augmented Generation.

LLMs hallucinate without external knowledge.

Vector databases store embeddings.
</textarea>

<button onclick="processDocs()">Ingest Documents</button>

</div>

<div class="card">

<b>Chunk Settings</b>

<div class="sliderLabel">Chunk Size (words)</div>
<input type="range" min="3" max="20" value="8" id="chunkSize">

<div class="sliderLabel">Overlap</div>
<input type="range" min="0" max="10" value="2" id="overlap">

</div>

<div class="card">

<b>Ask Question</b>

<input id="question" placeholder="What is RAG?">

<button onclick="runRAG()">Run RAG</button>

</div>

<div class="card">

<div class="toggle">
<input type="checkbox" id="showVectors" checked>
Show Embeddings
</div>

</div>

</div>

<div>

<div class="card">

<div id="pipeline">

<span id="s1" class="stage">Chunks</span>
<span id="s2" class="stage">Embeddings</span>
<span id="s3" class="stage">Search</span>
<span id="s4" class="stage">Context</span>
<span id="s5" class="stage">Answer</span>

</div>

</div>

<div class="card">

<b>Chunks</b>
<div id="chunks" class="result"></div>

</div>

<div class="card">

<b>Embeddings</b>
<div id="vectors" class="result"></div>

</div>

<div class="card">

<b>Retrieved Context</b>
<div id="context" class="result"></div>

</div>

<div class="card">

<b>Answer</b>
<div id="answer" class="result"></div>

</div>

</div>

</div>

<script>

let chunks=[]
let vectors=[]

function highlight(id){

document.querySelectorAll(".stage").forEach(x=>{
x.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function processDocs(){

highlight("s1")

let text=document.getElementById("docs").value
let words=text.split(" ")

let size=parseInt(document.getElementById("chunkSize").value)
let overlap=parseInt(document.getElementById("overlap").value)

chunks=[]

for(let i=0;i<words.length;i+=size-overlap){

chunks.push(words.slice(i,i+size).join(" "))

}

document.getElementById("chunks").innerHTML=""

chunks.forEach((c,i)=>{

document.getElementById("chunks").innerHTML+=
"Chunk "+(i+1)+": "+c+"<br><br>"

})

generateEmbeddings()

}

function generateEmbeddings(){

highlight("s2")

vectors=[]

if(!document.getElementById("showVectors").checked){

document.getElementById("vectors").innerHTML="Hidden"
return

}

document.getElementById("vectors").innerHTML=""

chunks.forEach((c,i)=>{

let v=Math.random().toFixed(3)

vectors.push(v)

document.getElementById("vectors").innerHTML+=
"Chunk "+(i+1)+" → Vector "+v+"<br><br>"

})

}

function runRAG(){

highlight("s3")

let q=document.getElementById("question").value.toLowerCase()

let best=0
let score=0

chunks.forEach((c,i)=>{

let s=0

q.split(" ").forEach(w=>{
if(c.toLowerCase().includes(w)) s++
})

if(s>score){
score=s
best=i
}

})

let context=chunks[best]

highlight("s4")

document.getElementById("context").innerHTML=context

setTimeout(()=>{

highlight("s5")

document.getElementById("answer").innerHTML=
"Answer generated from context: "+context

},700)

}

</script>

</body>
</html>
