<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>RAG Learning Simulator</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.sub{
text-align:center;
color:#94a3b8;
margin-bottom:20px;
}

.wrapper{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:10px;
padding:18px;
margin-bottom:15px;
}

.card h3{
margin-top:0;
font-size:18px;
}

textarea,input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-top:8px;
margin-bottom:10px;
font-size:14px;
}

button{
background:#3b82f6;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
width:100%;
margin-top:6px;
}

button:hover{
background:#2563eb;
}

.pipeline{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
margin-bottom:20px;
}

.stage{
background:#1e293b;
padding:12px;
border-radius:8px;
text-align:center;
font-size:13px;
border:1px solid #334155;
}

.active{
background:#3b82f6;
border-color:#3b82f6;
}

.result{
min-height:60px;
margin-top:10px;
color:#cbd5f5;
font-size:14px;
}

.footer{
text-align:center;
color:#64748b;
padding:15px;
font-size:12px;
}

</style>

</head>

<body>

<header>
RAG Simulator
</header>

<div class="sub">
Understand Retrieval Augmented Generation step-by-step
</div>

<div class="wrapper">

<div>

<div class="card">

<h3>Knowledge Base</h3>

<textarea id="docs">
Azure DevOps helps teams manage development projects.

RAG means Retrieval Augmented Generation.

LLMs can hallucinate without external knowledge.

Vector databases store embeddings for similarity search.
</textarea>

<button onclick="ingest()">Ingest Documents</button>

</div>

<div class="card">

<h3>Ask Question</h3>

<input id="question" placeholder="Example: What is RAG?">

<button onclick="runRAG()">Run RAG Pipeline</button>

</div>

</div>

<div>

<div class="pipeline">

<div id="s1" class="stage">Documents</div>
<div id="s2" class="stage">Chunking</div>
<div id="s3" class="stage">Embeddings</div>
<div id="s4" class="stage">Vector Search</div>
<div id="s5" class="stage">Context</div>
<div id="s6" class="stage">LLM Answer</div>

</div>

<div class="card">

<h3>Document Chunks</h3>

<div id="chunks" class="result"></div>

</div>

<div class="card">

<h3>Embeddings</h3>

<div id="embeddings" class="result"></div>

</div>

<div class="card">

<h3>Retrieved Context</h3>

<div id="context" class="result"></div>

</div>

<div class="card">

<h3>Generated Answer</h3>

<div id="answer" class="result"></div>

</div>

</div>

</div>

<div class="footer">
RAG Simulator • Educational Demo
</div>

<script>

let chunks=[]
let vectors=[]

function highlight(id){

document.querySelectorAll(".stage").forEach(x=>{
x.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function ingest(){

highlight("s1")

let text=document.getElementById("docs").value

chunks=text.split(".").map(x=>x.trim()).filter(x=>x)

document.getElementById("chunks").innerHTML=""

chunks.forEach((c,i)=>{

document.getElementById("chunks").innerHTML+=
"Chunk "+(i+1)+": "+c+"<br><br>"

})

setTimeout(embed,700)

}

function embed(){

highlight("s3")

vectors=[]

document.getElementById("embeddings").innerHTML=""

chunks.forEach((c,i)=>{

let v=Math.random().toFixed(3)

vectors.push(v)

document.getElementById("embeddings").innerHTML+=
"Chunk "+(i+1)+" → Vector "+v+"<br><br>"

})

}

function runRAG(){

highlight("s4")

let q=document.getElementById("question").value.toLowerCase()

let best=0
let score=0

chunks.forEach((c,i)=>{

let s=0

q.split(" ").forEach(w=>{
if(c.toLowerCase().includes(w)) s++
})

if(s>score){
score=s
best=i
}

})

let context=chunks[best]

highlight("s5")

document.getElementById("context").innerHTML=context

setTimeout(()=>{

highlight("s6")

document.getElementById("answer").innerHTML=
"Using retrieved context: "+context

},700)

}

</script>

</body>

</html>
